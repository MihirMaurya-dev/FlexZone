<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FlexZone</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            background-color: var(--body-bg);
            color: var(--text-color);
        }
        .static-page { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 60px 24px; 
        }
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .static-page h1 { 
            font-size: 2.5rem; 
            margin-top: 16px;
            margin-bottom: 12px; 
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .static-page .subtitle {
            color: var(--secondary-text);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 32px;
            align-items: start;
        }
        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
        .contact-card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 40px;
            backdrop-filter: blur(16px);
        }
        .form-group { 
            margin-bottom: 24px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            font-size: 0.9rem;
            color: var(--text-color);
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-text);
            font-size: 1.2rem;
            pointer-events: none;
        }
        .input-wrapper.textarea i {
            top: 24px;
        }
        .form-input { 
            width: 100%; 
            padding: 14px 16px 14px 48px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            background: var(--body-bg); 
            color: var(--text-color); 
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }
        textarea.form-input {
            resize: vertical;
            min-height: 120px;
        }
        .submit-btn { 
            background: var(--primary-color); 
            color: white; 
            padding: 14px 28px; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(var(--primary-rgb), 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(var(--primary-rgb), 0.5);
            opacity: 0.95;
        }
        .info-card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 32px;
            backdrop-filter: blur(16px);
        }
        .info-card h3 {
            font-size: 1.25rem;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .info-item {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            align-items: flex-start;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-icon-bg {
            background: rgba(249, 115, 22, 0.1);
            color: var(--primary-color);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .info-text h4 {
            font-size: 0.95rem;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .info-text p {
            font-size: 0.9rem;
            color: var(--secondary-text);
            line-height: 1.5;
        }
        .back-btn-container {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }
        .theme-switch-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 8px 12px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
        <span style="font-size: 0.85rem; font-weight: 500;">Dark Mode</span>
    </div>

    <div class="static-page">
        <div class="back-btn-container">
            <a href="index.php" class="ghost-btn">
                <i class='bx bx-arrow-back'></i> Back to Home
            </a>
        </div>
        
        <div class="header-section">
            <h1>Contact Us</h1>
            <p class="subtitle">Have questions, feedback, or need support? We're here to help!</p>
        </div>

        <div class="contact-grid">
            <!-- Form Card -->
            <div class="contact-card">
                <form onsubmit="event.preventDefault(); window.showMessage('Message sent! We will get back to you shortly.', 'success'); this.reset();">
                    <div class="form-group">
                        <label>Name</label>
                        <div class="input-wrapper">
                            <i class='bx bxs-user'></i>
                            <input type="text" class="form-input" required placeholder="Your Name">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class='bx bxs-envelope'></i>
                            <input type="email" class="form-input" required placeholder="your@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <div class="input-wrapper textarea">
                            <i class='bx bxs-message-square-detail'></i>
                            <textarea rows="5" class="form-input" required placeholder="How can we help?"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class='bx bxs-paper-plane'></i> Send Message
                    </button>
                </form>
            </div>

            <!-- Side Info Card -->
            <div class="info-card">
                <h3>Other Ways to Connect</h3>
                <div class="info-item">
                    <div class="info-icon-bg">
                        <i class='bx bxs-envelope-open'></i>
                    </div>
                    <div class="info-text">
                        <h4>Email Support</h4>
                        <p>support@flexzone.com</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon-bg">
                        <i class='bx bxs-map'></i>
                    </div>
                    <div class="info-text">
                        <h4>Headquarters</h4>
                        <p>123 Fitness Blvd,<br>Workout City, ST 12345</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon-bg">
                        <i class='bx bxs-time-five'></i>
                    </div>
                    <div class="info-text">
                        <h4>Working Hours</h4>
                        <p>Monday - Friday<br>9:00 AM - 6:00 PM EST</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/theme.js"></script>
</body>
</html>
